# ============================================================
# Netlify Deployment Config — Sistem Dashboard Pemantauan Bersepadu JTM
# PRD §8.2 — Persekitaran Netlify (CI/CD)
# ============================================================

[build]
  command = "bun run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Prisma needs these at build time to generate the client
  DATABASE_URL = "file:/tmp/dev.db"
  NEXT_PUBLIC_SUPABASE_URL = "https://fvgchttusdnfsjjtzhkf.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_55W-PRplj2AqPe68PRtXcA_rnmup_-G"

# Next.js 16 plugin (handles SSR / API routes on Netlify)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# SPA-friendly fallback (in case of static export paths)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
